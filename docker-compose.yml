version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: selfdash-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      node-api:    { condition: service_healthy }
      python-api:  { condition: service_healthy }
    networks: [dash]

  node-api:
    image: ghcr.io/kabelsalatundklartext/selfdashboard-node:latest
    # Zum lokalen Bauen: build: { context: ./backend-node }
    container_name: selfdash-node
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    environment:
      PORT: 4000
      DATA_DIR: /data
      PYTHON_API_URL: "http://python-api:4001"
      # Unraid Server 1 (Hauptserver)
      UNRAID_1_NAME:    "${UNRAID_1_NAME:-Tower}"
      UNRAID_1_HOST:    "${UNRAID_1_HOST:-}"
      UNRAID_1_API_KEY: "${UNRAID_1_API_KEY:-}"
      # Unraid Server 2 (optional)
      UNRAID_2_NAME:    "${UNRAID_2_NAME:-}"
      UNRAID_2_HOST:    "${UNRAID_2_HOST:-}"
      UNRAID_2_API_KEY: "${UNRAID_2_API_KEY:-}"
      # Unraid Server 3 (optional)
      UNRAID_3_NAME:    "${UNRAID_3_NAME:-}"
      UNRAID_3_HOST:    "${UNRAID_3_HOST:-}"
      UNRAID_3_API_KEY: "${UNRAID_3_API_KEY:-}"
      POLL_INTERVAL:    "${POLL_INTERVAL:-5000}"
    pid: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks: [dash]

  python-api:
    image: ghcr.io/kabelsalatundklartext/selfdashboard-python:latest
    # Zum lokalen Bauen: build: { context: ./backend-python }
    container_name: selfdash-python
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./data:/data
    environment:
      PORT: 4001
      DATA_DIR: /data
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      ADGUARD_URL:      "${ADGUARD_URL:-}"
      ADGUARD_USER:     "${ADGUARD_USER:-admin}"
      ADGUARD_PASSWORD: "${ADGUARD_PASSWORD:-}"
      CROWDSEC_URL:     "${CROWDSEC_URL:-}"
      CROWDSEC_API_KEY: "${CROWDSEC_API_KEY:-}"
      OPENWEATHER_KEY:  "${OPENWEATHER_KEY:-}"
      ICAL_URLS:        "${ICAL_URLS:-}"        # Komma-getrennte iCal URLs
      CALDAV_URL:       "${CALDAV_URL:-}"
      CALDAV_USER:      "${CALDAV_USER:-}"
      CALDAV_PASSWORD:  "${CALDAV_PASSWORD:-}"
      TZ:               "${TZ:-Europe/Berlin}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4001/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks: [dash]

networks:
  dash:
    driver: bridge
