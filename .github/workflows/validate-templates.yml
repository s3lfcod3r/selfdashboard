name: Validate Unraid Templates

on:
  push:
    paths:
      - 'unraid/**/*.xml'
      - 'unraid/ca_profile.xml'
  pull_request:
    paths:
      - 'unraid/**/*.xml'
  workflow_dispatch:

jobs:
  validate-xml:
    name: Validate XML Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate all template XMLs
        run: |
          echo "Validating XML files..."
          ERRORS=0
          for f in unraid/kabelsalatundklartext/*.xml; do
            echo -n "  Checking $f ... "
            if xmllint --noout "$f" 2>&1; then
              echo "✅ OK"
            else
              echo "❌ FAILED"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "❌ $ERRORS XML file(s) have errors."
            exit 1
          fi
          echo "✅ All XML templates valid."

      - name: Check required fields
        run: |
          echo "Checking required fields in templates..."
          ERRORS=0
          for f in unraid/kabelsalatundklartext/*.xml; do
            echo "  Checking $f:"
            for field in Name Repository Registry Support Project Overview Icon TemplateURL; do
              if grep -q "<$field>" "$f" || grep -q "<$field " "$f"; then
                echo "    ✅ $field present"
              else
                echo "    ⚠️  $field missing (optional but recommended)"
              fi
            done
          done

      - name: Check icon URLs are HTTPS
        run: |
          echo "Checking icon URLs use HTTPS..."
          if grep -r "<Icon>http://" unraid/kabelsalatundklartext/*.xml; then
            echo "❌ Icon URLs must use HTTPS!"
            exit 1
          fi
          echo "✅ All icon URLs use HTTPS."

      - name: Check TemplateURL points to raw GitHub
        run: |
          echo "Checking TemplateURL format..."
          if grep -r "<TemplateURL>https://github.com" unraid/kabelsalatundklartext/*.xml; then
            echo "❌ TemplateURL must point to raw.githubusercontent.com, not github.com!"
            exit 1
          fi
          echo "✅ TemplateURL format OK."

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════"
          echo " Template Validation Complete ✅"
          echo "═══════════════════════════════════"
          echo " Templates found:"
          ls -1 unraid/kabelsalatundklartext/*.xml | xargs -I{} basename {}
